name: Specmatic Contract Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  contract-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Create backend environment file
        run: |
          cp backend/.env.example backend/.env
          echo "PORT=8000" >> backend/.env
          echo "RATE_LIMIT_ENABLED=false" >> backend/.env
          echo "CONTRACT_TEST_MODE=true" >> backend/.env
          echo "GROQ_API_KEY=${{ secrets.GROQ_API_KEY || secrets.LLM_API_KEY || 'your-groq-api-key-here' }}" >> backend/.env

      - name: Start Veritas backend
        run: docker compose up -d --build

      - name: Wait for backend to be healthy
        run: |
          timeout 60 bash -c 'until curl -f http://localhost:8000/health; do sleep 2; done' || (docker compose logs && exit 1)

      - name: Verify contract endpoints
        run: |
          curl -fsS http://localhost:8000/api/tools
          curl -fsS http://localhost:8000/actuator/mappings
          curl -fsS -X POST http://localhost:8000/api/evaluation/evaluate \
            -H 'Content-Type: application/json' \
            -d '{"answer_id":"a-001"}'
          curl -fsS -X POST http://localhost:8000/api/research/query \
            -H 'Content-Type: application/json' \
            -d '{"query":"What patterns emerge in user onboarding feedback?","top_k":10,"auto_evaluate":true,"auto_improve":false}'

      - name: Create Specmatic license file from secret
        env:
          LICENSE_CONTENT: ${{ secrets.SPECMATIC_LICENSE_KEY }}
        run: |
          if [ -n "$LICENSE_CONTENT" ]; then
            echo "$LICENSE_CONTENT" > license.txt
          fi

      - name: Pull Specmatic Docker image (with retry)
        run: |
          for i in 1 2 3; do
            docker pull specmatic/specmatic:latest && break
            echo "Pull attempt $i failed, retrying in 10s..."
            sleep 10
          done

      - name: Download Specmatic JAR (fallback if Docker image unavailable)
        run: |
          if ! docker image inspect specmatic/specmatic > /dev/null 2>&1; then
            echo "Docker image unavailable — downloading Specmatic JAR as fallback"
            curl -L -o specmatic.jar \
              https://github.com/specmatic/specmatic/releases/latest/download/specmatic.jar
          else
            echo "Docker image present — JAR fallback not needed"
          fi

      - name: Run Specmatic contract tests
        run: bash run_contract_tests.sh
        env:
          SPECMATIC_LICENSE_KEY: ${{ secrets.SPECMATIC_LICENSE_KEY }}

      - name: Run Specmatic resiliency tests
        run: bash run_resiliency_tests.sh
        env:
          SPECMATIC_LICENSE_KEY: ${{ secrets.SPECMATIC_LICENSE_KEY }}

      - name: Print contract test report
        if: always()
        run: |
          if [ -f contract_test_results.json ]; then
            cat contract_test_results.json
          else
            echo "contract_test_results.json not found"
          fi

      - name: Upload contract test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: contract-test-report
          path: contract_test_results.json
