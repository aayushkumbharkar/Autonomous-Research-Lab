name: Specmatic Contract Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  contract-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Create backend environment file
        run: |
          cp backend/.env.example backend/.env
          echo "PORT=8000" >> backend/.env
          echo "RATE_LIMIT_ENABLED=false" >> backend/.env

      - name: Start Veritas backend
        run: docker compose up -d --build

      - name: Wait for backend to be healthy
        run: |
          timeout 60 bash -c 'until curl -f http://localhost:8000/health; do sleep 2; done' || (docker compose logs && exit 1)

      - name: Run Specmatic contract tests
        run: bash run_contract_tests.sh

      - name: Print contract test report
        if: always()
        run: |
          if [ -f contract_test_results.json ]; then
            cat contract_test_results.json
          else
            echo "contract_test_results.json not found"
          fi

      - name: Upload contract test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: contract-test-report
          path: contract_test_results.json

