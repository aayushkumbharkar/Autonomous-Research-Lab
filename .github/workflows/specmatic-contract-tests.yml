name: Specmatic Contract Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  contract-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Java (required for Specmatic JAR)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Install Python dependencies
        run: pip install -r backend/requirements.txt

      - name: Create backend environment file
        run: |
          cp .env.example .env
          echo "PORT=8000" >> .env
          echo "RATE_LIMIT_ENABLED=false" >> .env
          echo "GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}" >> .env

      - name: Start Veritas backend
        run: |
          docker compose up -d --build
          echo "=== docker compose ps ==="
          docker compose ps
          echo "Services:"
          docker compose ps --services
          echo "=== backend logs (tail 500) ==="
          docker compose logs --no-color --timestamps --tail=500 backend || docker compose logs --no-color --timestamps --tail=500 || true

      - name: Wait for backend to be healthy
        run: |
          WAIT_SECONDS=60
          ELAPSED=0
          INTERVAL=2
          until curl -sf http://localhost:8000/health > /dev/null 2>&1; do
            if [ "$ELAPSED" -ge "$WAIT_SECONDS" ]; then
              echo "Backend failed to become healthy within ${WAIT_SECONDS}s. Showing backend logs:"
              docker compose logs --no-color --timestamps --tail=500 backend || docker compose logs --no-color --timestamps --tail=500 || true
              docker compose ps
              exit 1
            fi
            sleep "$INTERVAL"
            ELAPSED=$((ELAPSED + INTERVAL))
          done
          echo "Backend is healthy."

      - name: Verify actuator endpoint
        run: |
          echo "=== /actuator/mappings (must succeed for Specmatic coverage) ==="
          curl -fsS http://localhost:8000/actuator/mappings > actuator_output.json || (
            echo "ERROR: actuator/mappings did not respond; dumping backend logs:"
            docker compose logs --no-color --timestamps --tail=500 backend || docker compose logs --no-color --timestamps --tail=500 || true
            exit 1
          )
          python3 -c "
          import json, sys
          data = json.load(open('actuator_output.json'))
          routes = data['contexts']['application']['mappings']['dispatcherServlets']['dispatcherServlet']
          print(f'Routes discovered: {len(routes)}')
          for r in routes: print(' ', r['predicate'])
          "

      - name: Verify all contract endpoints are responding
        run: |
          # Hard fail only on connection errors (curl exit 7).
          # HTTP 4xx/5xx are logged with body for debugging — the Specmatic
          # JAR run below is the authoritative contract gate.

          echo "=== /health ==="
          curl -fsS http://localhost:8000/health

          echo "=== /api/health ==="
          curl -fsS http://localhost:8000/api/health

          echo "=== /api/tools ==="
          curl -s --show-error -w "\nHTTP %{http_code}\n" \
            http://localhost:8000/api/tools || true

          echo "=== /api/search ==="
          curl -s --show-error -w "\nHTTP %{http_code}\n" \
            -X POST http://localhost:8000/api/search \
            -H 'Content-Type: application/json' \
            -d '{"query":"machine learning applications","top_k":5,"semantic_weight":0.8,"keyword_weight":0.2}' || true

          echo "=== /api/ingest/text ==="
          curl -s --show-error -w "\nHTTP %{http_code}\n" \
            -X POST http://localhost:8000/api/ingest/text \
            -H 'Content-Type: application/json' \
            -d '{"filename":"test.txt","text":"Sample content for contract testing."}' || true

          echo "=== /api/research/query ==="
          curl -s --show-error -w "\nHTTP %{http_code}\n" \
            -X POST http://localhost:8000/api/research/query \
            -H 'Content-Type: application/json' \
            -d '{"query":"What is RAG?","top_k":5,"auto_evaluate":true,"auto_improve":false}' || true

          echo "=== /api/evaluation/evaluate ==="
          curl -s --show-error -w "\nHTTP %{http_code}\n" \
            -X POST http://localhost:8000/api/evaluation/evaluate \
            -H 'Content-Type: application/json' \
            -d '{"answer_id":"a-001"}' || true

          echo "=== /api/interview/sessions ==="
          curl -s --show-error -w "\nHTTP %{http_code}\n" \
            -X POST http://localhost:8000/api/interview/sessions \
            -H 'Content-Type: application/json' \
            -d '{"topic":"User experience with the new dashboard"}' || true

      - name: Download Specmatic JAR
        run: |
          curl -fL -o specmatic.jar \
            https://github.com/specmatic/specmatic/releases/latest/download/specmatic.jar
          echo "Specmatic JAR size: $(du -sh specmatic.jar | cut -f1)"

      - name: Run Specmatic contract + resiliency tests
        run: bash run_contract_tests.sh

      - name: List generated Specmatic reports
        if: always()
        run: |
          echo "=== build/reports/specmatic tree ==="
          find build/reports/specmatic -type f 2>/dev/null || echo "No reports found"

      - name: Upload Specmatic HTML Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: specmatic-report
          path: build/reports/specmatic/
          if-no-files-found: warn
