openapi: 3.0.3
info:
  title: Autonomous Research Lab (Veritas) API
  description: >
    Contract specification for the Veritas research platform.
    Covers the core API surface: health, search, ingestion, research, and evaluation.
  version: 1.0.0
  contact:
    name: Veritas Dev Team

servers:
  - url: http://localhost:8000
    description: Local development server

paths:
  /health:
    get:
      operationId: healthSimple
      summary: Simple health check for CI/CD readiness probes
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                required:
                  - status
                properties:
                  status:
                    type: string
                    enum:
                      - ok
              examples:
                healthy:
                  value:
                    status: ok

  /api/health:
    get:
      operationId: healthDetailed
      summary: Detailed system health check with component status
      responses:
        '200':
          description: Detailed health status
          content:
            application/json:
              schema:
                type: object
                required:
                  - status
                  - components
                  - version
                properties:
                  status:
                    type: string
                    enum:
                      - healthy
                  components:
                    type: object
                    properties:
                      database:
                        type: string
                      chromadb:
                        type: object
                        properties:
                          status:
                            type: string
                          document_count:
                            type: integer
                      bm25_index:
                        type: object
                        properties:
                          status:
                            type: string
                          document_count:
                            type: integer
                      embedding_model:
                        type: string
                  version:
                    type: string
              examples:
                healthy:
                  value:
                    status: healthy
                    components:
                      database: connected
                      chromadb:
                        status: connected
                        document_count: 42
                      bm25_index:
                        status: ready
                        document_count: 42
                      embedding_model: loaded
                    version: "1.0.0"

  /api/search:
    post:
      operationId: hybridSearch
      summary: Perform hybrid semantic + keyword search
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - query
              properties:
                query:
                  type: string
                  minLength: 1
                  description: Search query
                top_k:
                  type: integer
                  minimum: 1
                  maximum: 100
                  default: 10
                  description: Number of results
                semantic_weight:
                  type: number
                  minimum: 0.0
                  maximum: 1.0
                  default: 0.6
                keyword_weight:
                  type: number
                  minimum: 0.0
                  maximum: 1.0
                  default: 0.4
                filters:
                  type: object
                  nullable: true
                  description: Metadata filters
            examples:
              basic_search:
                $ref: './examples/basic_search_request.json'
              not_found:
                $ref: './examples/not_found_request.json'
              weighted_search:
                value:
                  query: "machine learning applications"
                  top_k: 10
                  semantic_weight: 0.8
                  keyword_weight: 0.2
      responses:
        '200':
          description: Search results with metadata
          content:
            application/json:
              schema:
                type: object
                required:
                  - query
                  - results
                  - total_results
                properties:
                  query:
                    type: string
                  results:
                    type: array
                    items:
                      type: object
                      required:
                        - chunk_id
                        - content
                        - score
                        - semantic_score
                        - keyword_score
                        - transcript_id
                        - chunk_index
                      properties:
                        chunk_id:
                          type: string
                        content:
                          type: string
                        score:
                          type: number
                        semantic_score:
                          type: number
                        keyword_score:
                          type: number
                        speaker:
                          type: string
                          nullable: true
                        transcript_id:
                          type: string
                        chunk_index:
                          type: integer
                  total_results:
                    type: integer
                  search_metadata:
                    type: object
              examples:
                basic_search:
                  $ref: './examples/basic_search_response.json'
                not_found:
                  $ref: './examples/not_found_response.json'
                weighted_search:
                  value:
                    query: "machine learning applications"
                    results:
                      - chunk_id: "xyz-789"
                        content: "We explored several machine learning applications in predictive maintenance."
                        score: 0.88
                        semantic_score: 0.90
                        keyword_score: 0.85
                        speaker: "Participant B"
                        transcript_id: "tx-002"
                        chunk_index: 5
                    total_results: 1
                    search_metadata:
                      method: hybrid
                      duration_ms: 30
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                type: object
                properties:
                  detail:
                    type: array
                    items:
                      type: object
                      properties:
                        loc:
                          type: array
                          items: {}
                        msg:
                          type: string
                        type:
                          type: string

  /api/ingest/text:
    post:
      operationId: ingestText
      summary: Ingest a text transcript
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - text
                - filename
              properties:
                text:
                  type: string
                  minLength: 1
                  description: Raw transcript text
                filename:
                  type: string
                  minLength: 1
                  description: Source filename
                metadata:
                  type: object
                  nullable: true
                  description: Additional metadata
            examples:
              ingest_transcript:
                value:
                  text: "Interviewer: Tell me about your experience.\nParticipant: It was very insightful..."
                  filename: "interview_001.txt"
                  metadata:
                    project: "UX Research Q4"
      responses:
        '200':
          description: Ingestion result
          content:
            application/json:
              schema:
                type: object
                required:
                  - transcript_id
                  - filename
                  - source_type
                  - chunk_count
                  - status
                  - message
                properties:
                  transcript_id:
                    type: string
                  filename:
                    type: string
                  source_type:
                    type: string
                  chunk_count:
                    type: integer
                  status:
                    type: string
                  message:
                    type: string
              examples:
                ingest_transcript:
                  value:
                    transcript_id: "tx-001"
                    filename: "interview_001.txt"
                    source_type: text
                    chunk_count: 12
                    status: processed
                    message: "Ingested 12 chunks from 'interview_001.txt'"

  /api/research/query:
    post:
      operationId: submitResearchQuery
      summary: Submit a research query for grounded answer generation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - query
              properties:
                query:
                  type: string
                  minLength: 1
                  description: Research question
                top_k:
                  type: integer
                  minimum: 1
                  maximum: 50
                  default: 10
                auto_evaluate:
                  type: boolean
                  default: true
                auto_improve:
                  type: boolean
                  default: true
            examples:
              research_question:
                value:
                  query: "What patterns emerge in user onboarding feedback?"
                  top_k: 10
                  auto_evaluate: true
                  auto_improve: false
      responses:
        '200':
          description: Research answer with citations and confidence
          content:
            application/json:
              schema:
                type: object
                required:
                  - query_id
                  - answer_id
                  - query_text
                  - answer_text
                  - attempt_number
                  - confidence
                  - created_at
                properties:
                  query_id:
                    type: string
                  answer_id:
                    type: string
                  query_text:
                    type: string
                  answer_text:
                    type: string
                  reasoning_trace:
                    type: string
                    nullable: true
                  attempt_number:
                    type: integer
                  citations:
                    type: array
                    items:
                      type: object
                      properties:
                        index:
                          type: integer
                        chunk_id:
                          type: string
                        content:
                          type: string
                        relevance_score:
                          type: number
                  claim_verifications:
                    type: array
                    items:
                      type: object
                      properties:
                        claim:
                          type: string
                        status:
                          type: string
                        supporting_chunk_ids:
                          type: array
                          items:
                            type: string
                        confidence:
                          type: number
                  confidence:
                    type: object
                    required:
                      - confidence
                      - risk_level
                    properties:
                      confidence:
                        type: number
                        minimum: 0.0
                        maximum: 1.0
                      risk_level:
                        type: string
                      disagreement_score:
                        type: number
                        nullable: true
                      explanation:
                        type: string
                  eval_scores:
                    type: object
                    nullable: true
                  created_at:
                    type: string
                    format: date-time
              examples:
                research_question:
                  value:
                    query_id: "q-001"
                    answer_id: "a-001"
                    query_text: "What patterns emerge in user onboarding feedback?"
                    answer_text: "Based on the transcripts, three key patterns emerge..."
                    reasoning_trace: "Retrieved 10 chunks, generated answer, verified 3 claims"
                    attempt_number: 1
                    citations: []
                    claim_verifications: []
                    confidence:
                      confidence: 0.82
                      risk_level: low
                      disagreement_score: null
                      explanation: "High retrieval relevance with consistent sources"
                    eval_scores:
                      composite: 0.85
                      faithfulness: 0.9
                      relevance: 0.8
                    created_at: "2025-01-15T10:30:00Z"

  /api/evaluation/evaluate:
    post:
      operationId: runEvaluation
      summary: Manually evaluate an answer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - answer_id
              properties:
                answer_id:
                  type: string
                  description: Answer to evaluate
            examples:
              eval_request:
                value:
                  answer_id: "a-001"
              not_found:
                value:
                  answer_id: "non-existent-id"
      responses:
        '200':
          description: Evaluation results
          content:
            application/json:
              schema:
                type: object
                required:
                  - id
                  - answer_id
                  - composite_score
                  - citation_coverage
                  - retrieval_overlap
                  - claim_support_ratio
                  - created_at
                properties:
                  id:
                    type: string
                  answer_id:
                    type: string
                  composite_score:
                    type: number
                  citation_coverage:
                    type: number
                  retrieval_overlap:
                    type: number
                  claim_support_ratio:
                    type: number
                  scores:
                    type: array
                    items:
                      type: object
                      properties:
                        dimension:
                          type: string
                        score:
                          type: number
                        explanation:
                          type: string
                        is_deterministic:
                          type: boolean
                  created_at:
                    type: string
                    format: date-time
              examples:
                eval_request:
                  value:
                    id: "eval-001"
                    answer_id: "a-001"
                    composite_score: 0.85
                    citation_coverage: 0.9
                    retrieval_overlap: 0.8
                    claim_support_ratio: 0.85
                    scores:
                      - dimension: faithfulness
                        score: 0.9
                        explanation: "Answer closely follows source material"
                        is_deterministic: false
                    created_at: "2025-01-15T10:31:00Z"
        '404':
          description: Answer not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  detail:
                    type: string
              examples:
                not_found:
                  value:
                    detail: "Answer not found"
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                type: object
                properties:
                  detail:
                    type: array
                    items:
                      type: object

  /api/interview/sessions:
    post:
      operationId: createInterviewSession
      summary: Start a new interview session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - topic
              properties:
                topic:
                  type: string
                  minLength: 1
                  description: Interview topic
            examples:
              new_session:
                value:
                  topic: "User experience with the new dashboard"
      responses:
        '200':
          description: Created session with opening question
          content:
            application/json:
              schema:
                type: object
                required:
                  - id
                  - topic
                  - status
                  - created_at
                properties:
                  id:
                    type: string
                  topic:
                    type: string
                  status:
                    type: string
                  summary:
                    type: string
                    nullable: true
                  messages:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        role:
                          type: string
                        content:
                          type: string
                        created_at:
                          type: string
                          format: date-time
                  created_at:
                    type: string
                    format: date-time
              examples:
                new_session:
                  value:
                    id: "sess-001"
                    topic: "User experience with the new dashboard"
                    status: active
                    summary: null
                    messages:
                      - id: "msg-001"
                        role: moderator
                        content: "Welcome! Let's discuss the new dashboard. What was your first impression?"
                        created_at: "2025-01-15T10:00:00Z"
                    created_at: "2025-01-15T10:00:00Z"

  /api/tools:
    get:
      operationId: listTools
      summary: List all available MCP tools
      responses:
        '200':
          description: Available tools
          content:
            application/json:
              schema:
                type: object
                required:
                  - tools
                properties:
                  tools:
                    type: array
                    items:
                      type: object
                      properties:
                        name:
                          type: string
                        description:
                          type: string
              examples:
                tools_list:
                  value:
                    tools:
                      - name: search
                        description: "Hybrid semantic + keyword search"
                      - name: summarize
                        description: "Summarize retrieved chunks"
